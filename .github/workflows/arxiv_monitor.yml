name: Vigilancia Monitor — CCHEN

on:
  schedule:
    # Cada lunes a las 08:00 UTC (05:00 Chile)
    - cron: "0 8 * * 1"
  workflow_dispatch:  # Permite ejecución manual desde GitHub
    inputs:
      send_real_email:
        description: "Enviar boletin real por Brevo (si no, queda en dry-run)"
        required: false
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para hacer push de los CSV actualizados

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install --quiet requests pandas openpyxl supabase python-dotenv

      # ── Módulo Vigilancia ────────────────────────────────────────────────

      - name: Ejecutar monitor arXiv
        run: python Scripts/arxiv_monitor.py

      - name: Ejecutar monitor de noticias (Google News)
        run: python Scripts/news_monitor.py

      - name: Ejecutar radar de convocatorias (ANID)
        # continue-on-error porque depende de scraping HTML del sitio de ANID
        continue-on-error: true
        run: python Scripts/convocatorias_monitor.py

      - name: Ejecutar monitor IAEA INIS
        # continue-on-error porque depende de la API pública de INIS
        continue-on-error: true
        run: python Scripts/iaea_inis_monitor.py

      # ── Módulo Difusión: boletín semanal HTML ────────────────────────────

      - name: Generar boletín semanal (+ Brevo en modo seguro)
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          BREVO_FROM_NAME: Observatorio CCHEN
          BREVO_TO_EMAILS: b.ayalainostroza@gmail.com
          BREVO_REPLY_TO: b.ayalainostroza@gmail.com
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.send_real_email }}" == "true" ]]; then
            echo "Modo: envio real Brevo (workflow manual)"
            python Scripts/generar_boletin.py --send-brevo --confirm-send
          else
            echo "Modo: dry-run Brevo (sin envio real)"
            python Scripts/generar_boletin.py --send-brevo --dry-run
          fi

      - name: Publicar boletín en docs/ (GitHub Pages)
        continue-on-error: true
        run: python Scripts/build_boletines_index.py

      # ── Módulo Gobernanza: calidad de datos ─────────────────────────────

      - name: Verificar calidad de datos
        continue-on-error: true
        run: |
          pip install --quiet pandas openpyxl
          python Database/data_quality.py --output Data/Vigilancia/calidad_datos.csv

      # ── Migrar CSVs a Supabase ───────────────────────────────────────────────

      - name: Migrar datos de vigilancia a Supabase
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python Database/migrate_vigilancia.py

      # ── Commit y push ────────────────────────────────────────────────────

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "CCHEN Observatory Bot"
          git config user.email "observatory@cchen.cl"
          FILES=(
            Data/Vigilancia/arxiv_monitor.csv
            Data/Vigilancia/arxiv_state.json
            Data/Vigilancia/news_monitor.csv
            Data/Vigilancia/news_state.json
            Data/Vigilancia/convocatorias_curadas.csv
            Data/Vigilancia/iaea_inis_monitor.csv
            Data/Vigilancia/iaea_inis_state.json
            Data/Vigilancia/calidad_datos.csv
          )

          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          if [ -d "Data/Boletines" ]; then
            git add Data/Boletines/
          fi

          if [ -d "Docs/boletines" ]; then
            git add Docs/boletines/ Docs/index.html
          fi

          if git diff --staged --quiet; then
            echo "Sin cambios para commit."
          else
            git commit -m "chore(data): vigilancia + boletin update $(date +%Y-%m-%d)"
            git push
          fi

      # ── Resumen en el log ────────────────────────────────────────────────

      - name: Resumen en el log
        if: always()
        run: |
          file_rows() {
            local path="$1"
            if [ -f "$path" ]; then
              local rows
              rows=$(tail -n +2 "$path" | wc -l | tr -d ' ')
              echo "$rows"
            else
              echo "0"
            fi
          }

          echo "=== Estado operativo de fuentes ==="
          if [ -f Data/Vigilancia/arxiv_monitor.csv ]; then
            echo "arXiv: OK ($(file_rows Data/Vigilancia/arxiv_monitor.csv) filas)"
          else
            echo "arXiv: SKIP (archivo no disponible)"
          fi

          if [ -f Data/Vigilancia/news_monitor.csv ]; then
            echo "News: OK ($(file_rows Data/Vigilancia/news_monitor.csv) filas)"
          else
            echo "News: SKIP (archivo no disponible)"
          fi

          if [ -f Data/Vigilancia/convocatorias_curadas.csv ]; then
            echo "Convocatorias: OK ($(file_rows Data/Vigilancia/convocatorias_curadas.csv) filas)"
          else
            echo "Convocatorias: SKIP (archivo no disponible)"
          fi

          if [ -f Data/Vigilancia/iaea_inis_monitor.csv ]; then
            echo "IAEA INIS: OK ($(file_rows Data/Vigilancia/iaea_inis_monitor.csv) filas)"
          else
            echo "IAEA INIS: SKIP (archivo no disponible)"
          fi

          if [ -f Data/Publications/cchen_citation_graph.csv ]; then
            echo "Citation graph: OK ($(file_rows Data/Publications/cchen_citation_graph.csv) filas)"
          else
            echo "Citation graph: SKIP (archivo no disponible)"
          fi

          if [ -f Data/Vigilancia/calidad_datos.csv ]; then
            echo "Data quality: OK"
          else
            echo "Data quality: SKIP (archivo no disponible)"
          fi

          if ls Data/Boletines/boletin_*.html >/dev/null 2>&1; then
            latest_boletin=$(ls -1t Data/Boletines/boletin_*.html | head -n 1)
            echo "Boletin: OK (${latest_boletin##*/})"
          else
            echo "Boletin: SKIP (archivo no disponible)"
          fi

          echo ""
          echo "=== arXiv — ultimos papers ==="
          tail -5 Data/Vigilancia/arxiv_monitor.csv 2>/dev/null || echo "Sin archivo aun"
          echo ""
          echo "=== Noticias — ultimas nuevas ==="
          tail -5 Data/Vigilancia/news_monitor.csv 2>/dev/null || echo "Sin archivo aun"
          echo ""
          echo "=== Convocatorias ANID ==="
          if [ -f Data/Vigilancia/convocatorias_curadas.csv ]; then
            total=$(tail -n +2 Data/Vigilancia/convocatorias_curadas.csv | wc -l | tr -d ' ')
            abiertas=$(awk -F',' 'NR>1 && $6=="Abierto"' Data/Vigilancia/convocatorias_curadas.csv | wc -l | tr -d ' ')
            proximas=$(awk -F',' 'NR>1 && $6=="Proximo"' Data/Vigilancia/convocatorias_curadas.csv | wc -l | tr -d ' ')
            echo "Total: $total | Abiertas: $abiertas | Proximas: $proximas"
          else
            echo "Sin archivo de convocatorias aun"
          fi
          echo ""
          echo "=== IAEA INIS — ultimos documentos ==="
          tail -5 Data/Vigilancia/iaea_inis_monitor.csv 2>/dev/null || echo "Sin archivo aun"
          echo ""
          echo "=== Boletin generado ==="
          ls -lh Data/Boletines/ 2>/dev/null || echo "Sin boletines aun"
          echo ""
          echo "=== Calidad de datos ==="
          if [ -f Data/Vigilancia/calidad_datos.csv ]; then
            tail -10 Data/Vigilancia/calidad_datos.csv
          else
            echo "Sin reporte de calidad aun"
          fi
