[pytest]
testpaths = Tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Suppress noisy third-party deprecation warnings from pyiceberg/pydantic
filterwarnings =
    ignore::DeprecationWarning:pyiceberg
    ignore:urllib3 v2 only supports OpenSSL 1.1.1\+.*
    ignore:Python versions below 3\.10 are deprecated.*:DeprecationWarning
    ignore:The 'timeout' parameter is deprecated.*:DeprecationWarning
    ignore:The 'verify' parameter is deprecated.*:DeprecationWarning
addopts = -v --tb=short
