[uwsgi]

http            =  0.0.0.0:5000
uid             =  ckan
gid             =  ckan
wsgi-file       =  /srv/app/wsgi.py
chdir           =  /srv/app
module          =  wsgi:application
master          =  true
pidfile         =  /tmp/%n.pid
harakiri        =  50
max-requests    =  5000
vacuum          =  true
callable        =  application
buffer-size     =  32768
strict          =  true
