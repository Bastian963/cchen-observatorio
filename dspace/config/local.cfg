# DSpace local overrides for the canonical observatorio compose.
# The base config comes from the official DSpace image and this file only
# overrides the environment-specific values needed by the local Docker stack.

db.url = jdbc:postgresql://dspace-db:5432/dspace
db.username = dspace
db.password = dspace

solr.server = http://dspace-solr:8983/solr

dspace.server.url = http://localhost:8080/server
dspace.ui.url = http://localhost:4000
